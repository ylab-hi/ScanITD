{% set name = "scanitd" %}
{% set version = "0.9.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/scanitd-{{ version }}.tar.gz
  sha256: 554efdf1c206a332fca1933a2ffb765d26127e22aaacadf86d170d21cbe288a6

build:
  noarch: python
  number: 0
  run_exports:
    - {{ pin_subpackage('scanitd', max_pin="x.x") }}
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  entry_points:
    - scanitd = scanitd.cli.cli:app

requirements:
  host:
    - python >=3.9
    - pip
    - hatchling
  run:
    - python >=3.9
    - numpy >=2.0.0
    - pysam >=0.22.0
    - pyfaidx >=0.7.2
    - psutil >=5.9.5
    - ssw-py >=1.0.1
    - loguru >=0.7.0
    - typer >=0.12.5
    - rich >=13.7.0

test:
  commands:
    - scanitd --help

about:
  home: https://github.com/ylab-hi/ScanITD
  summary: Detecting internal tandem duplication with robust variant allele frequency estimation
  license: MIT
  license_file: LICENSE
  doc_url: https://scanitd.readthedocs.io

extra:
  identifiers:
    - doi:10.1093/gigascience/giaa089
  recipe-maintainers:
    - dolittle007
